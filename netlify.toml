# Build from repo ROOT (not /shared). In Netlify UI leave Base directory blank.

[build]
  base = ""
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

# SPA fallback — React Router client routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
